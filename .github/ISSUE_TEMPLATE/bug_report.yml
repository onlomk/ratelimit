name: Bug report
description: Report a reproducible problem in ratelimit
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for maintainers to reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal code, test, or steps to reproduce the issue.
      placeholder: |
        1. Configure limiter with ...
        2. Call Allow with ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ratelimit version
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: go version
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - Memory
        - Redis
        - Redis Cluster / Ring
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Remove secrets, tokens, private URLs, and personal data before posting.
      render: text
